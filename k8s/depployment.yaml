apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops
  template:
    metadata:
      labels:
        app: aiops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: aiops
        image: chaitanyagaajula/aiops-app:latest
        ports:
        - containerPort: 5000
        - containerPort: 8000
